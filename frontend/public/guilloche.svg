<svg xmlns="http://www.w3.org/2000/svg" width="540" height="540" viewBox="0 0 540 540">
  <!-- Fine banknote-style guilloché line-work. Tiled at low opacity behind the
       app to evoke engraved currency. Two phase-shifted spirograph rosettes. -->
  <defs>
    <g id="rosette">
      <g fill="none" stroke="#c8a951" stroke-width="0.6">
        <circle cx="270" cy="270" r="40" />
        <circle cx="270" cy="270" r="70" />
        <circle cx="270" cy="270" r="100" />
        <circle cx="270" cy="270" r="130" />
        <circle cx="270" cy="270" r="160" />
        <circle cx="270" cy="270" r="190" />
        <circle cx="270" cy="270" r="220" />
      </g>
    </g>
  </defs>
  <rect width="540" height="540" fill="none" />
  <g opacity="0.9">
    <use href="#rosette" />
  </g>
  <g fill="none" stroke="#69b3e7" stroke-width="0.4" opacity="0.7">
    <ellipse cx="270" cy="270" rx="230" ry="120" transform="rotate(0 270 270)" />
    <ellipse cx="270" cy="270" rx="230" ry="120" transform="rotate(30 270 270)" />
    <ellipse cx="270" cy="270" rx="230" ry="120" transform="rotate(60 270 270)" />
    <ellipse cx="270" cy="270" rx="230" ry="120" transform="rotate(90 270 270)" />
    <ellipse cx="270" cy="270" rx="230" ry="120" transform="rotate(120 270 270)" />
    <ellipse cx="270" cy="270" rx="230" ry="120" transform="rotate(150 270 270)" />
  </g>
</svg>
